name: 打包 GPhotoUp

# 觸發條件：僅允許在 GitHub 網頁上手動觸發
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest 

    steps:
    - name: 1. 取得最新程式碼
      uses: actions/checkout@v4

    - name: 2. 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 3. 安裝依賴套件與 PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 4. 執行 PyInstaller 打包程式 (單行指令防報錯)
      run: |
        pyinstaller --noconsole --onefile --hidden-import "keyring.backends.Windows" --hidden-import "pystray._win32" --collect-all "customtkinter" --name "GooglePhotosUploader" main.py

    - name: 5. 上傳打包好的 .exe 供下載
      uses: actions/upload-artifact@v4
      with:
        name: GPhotoUp-Executable
        path: dist/GooglePhotosUploader.exe
