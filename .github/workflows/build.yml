name: 打包 GPhotoUp 資料夾版

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest 

    steps:
    - name: 1. 取得最新程式碼
      uses: actions/checkout@v4

    - name: 2. 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 3. 安裝依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 4. 下載 Rclone 引擎
      run: |
        Invoke-WebRequest -Uri "https://downloads.rclone.org/rclone-current-windows-amd64.zip" -OutFile "rclone.zip"
        Expand-Archive -Path "rclone.zip" -DestinationPath "rclone_temp"
        Get-ChildItem -Path "rclone_temp" -Filter "rclone.exe" -Recurse | Move-Item -Destination .

    - name: 5. 執行 PyInstaller 打包 (資料夾模式 - 單行防報錯)
      run: |
        pyinstaller --noconsole --onedir --add-binary "rclone.exe;." --hidden-import "keyring.backends.Windows" --hidden-import "pystray._win32" --collect-all "customtkinter" --name "GPhotoUP_System" main.py

    - name: 6. 壓縮打包資料夾
      run: |
        Compress-Archive -Path dist/GPhotoUP_System -DestinationPath GPhotoUP_Pro_Package.zip

    - name: 7. 上傳 ZIP 供下載
      uses: actions/upload-artifact@v4
      with:
        name: GPhotoUP-Pro-Full-Package
        path: GPhotoUP_Pro_Package.zip
